workflows:
  ios-build:
    name: iOS Cloud Firestore Fix
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean build folders
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock pubspec.lock .dart_tool
      - name: Get packages
        script: flutter pub get
      - name: Force iOS 15 in Xcode project file (Linux-compatible)
        script: |
          sed -i 's/13.0/15.0/g' ios/Runner.xcodeproj/project.pbxproj || true
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS app
        script: flutter build ios --release
