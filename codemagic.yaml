workflows:
  ios-sim-fast:
    name: iOS Simulator — Fast Boot
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        RECORD: "0"          # set to "1" to always record a video
    scripts:
      - name: Env info
        script: |
          set -euo pipefail
          flutter --version
          dart --version
          xcodebuild -version
          pod --version

      - name: Static checks (fast fail)
        script: |
          set -euo pipefail
          flutter pub get
          flutter analyze

      - name: Verify Firebase plist & bundle id
        script: |
          set -euo pipefail
          PLIST="ios/Runner/GoogleService-Info.plist"
          [ -f "$PLIST" ] || { echo "GoogleService-Info.plist missing at $PLIST"; exit 1; }
          P_BUNDLE=$(/usr/libexec/PlistBuddy -c 'Print:BUNDLE_ID' "$PLIST")
          X_BUNDLE=$(
            xcodebuild -showBuildSettings -project ios/Runner.xcodeproj -scheme Runner -configuration Debug 2>/dev/null \
            | awk -F' = ' '/PRODUCT_BUNDLE_IDENTIFIER/{print $2}' | tail -1
          )
          echo "Firebase plist bundle: $P_BUNDLE"
          echo "Resolved Xcode bundle: $X_BUNDLE"
          [ "$P_BUNDLE" = "$X_BUNDLE" ] || { echo "ERROR: Bundle IDs do not match."; exit 2; }

      - name: Pod install (incremental)
        script: |
          set -euo pipefail
          # No rm -rf Pods; keep them for incremental builds.
          (cd ios && pod install)

      - name: Build app (same experience as Android)
        script: |
          set -euo pipefail
          # If RC_API_KEY_IOS is empty, your service safely falls back to Firestore.
          flutter build ios --simulator --debug -t lib/main.dart \
            --dart-define=RC_API_KEY_IOS=${RC_API_KEY_IOS:-} \
            --dart-define=RC_API_KEY_ANDROID=${RC_API_KEY_ANDROID:-}

            - name: Run on Simulator and record
        script: |
          set -euo pipefail
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          [ -d "$APP_PATH" ] || { echo "Runner.app not found"; exit 1; }
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print:CFBundleIdentifier' "$APP_PATH/Info.plist")

          # Newest available iOS runtime
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 -c 'import json,sys; rs=[x for x in json.load(sys.stdin)["runtimes"] if x.get("isAvailable",True) and x["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]; rs.sort(key=lambda x:(x.get("version") or "", x["identifier"])); print(rs[-1]["identifier"])')
          echo "Runtime: $RUNTIME_ID"

          # Reuse a shutdown iPhone under that runtime if present
          UUID=$(xcrun simctl list devices -j | RUNTIME_ID="$RUNTIME_ID" python3 -c 'import json,sys,os; rt=os.environ["RUNTIME_ID"]; dev=None; d=json.load(sys.stdin)["devices"].get(rt,[]); 
for x in d:
  if x.get("isAvailable",True) and x.get("state")=="Shutdown" and x.get("name","").startswith("iPhone"):
    dev=x["udid"]; break
print(dev or "")') || true

          if [[ -z "${UUID:-}" ]]; then
            # Choose the newest iPhone device type by name
            DEVICE_NAME=$(xcrun simctl list devicetypes -j | python3 -c 'import json,re,sys; dt=json.load(sys.stdin)["devicetypes"]; iph=[d["name"] for d in dt if d["name"].startswith("iPhone ")]; 
def num(n): 
  m=re.search(r"(\d+)", n); 
  return int(m.group(1)) if m else 0
iph.sort(key=num, reverse=True); 
print(iph[0] if iph else dt[-1]["name"])')
            echo "Creating device: $DEVICE_NAME"
            set +e
            UUID=$(xcrun simctl create "CM_RUN_$$" "$DEVICE_NAME" "$RUNTIME_ID" 2>/dev/null)
            [[ -n "$UUID" ]] || UUID=$(xcrun simctl create "CM_RUN_$$" "$DEVICE_NAME")
            set -e
          fi

          [[ -n "$UUID" ]] || { echo "Failed to obtain/create a simulator device"; exit 1; }
          echo "Using simulator: $UUID"

          xcrun simctl boot "$UUID" || true
          xcrun simctl bootstatus "$UUID" -b || true
          sleep 2

          mkdir -p preview sim_logs
          LOGFILE="sim_logs/run_$(date +%s).log"
          xcrun simctl spawn "$UUID" log stream --level=debug --style=compact --predicate "process == \"Runner\"" > "$LOGFILE" 2>&1 &
          LOGPID=$!

          # Only record when RECORD=1 (saves money). Flip to 1 when you need video.
          if [[ "${RECORD:-0}" == "1" ]]; then
            xcrun simctl io "$UUID" recordVideo "preview/run.mp4" &
            VIDPID=$!
            sleep 1
          fi

          set +e
          xcrun simctl install "$UUID" "$APP_PATH"
          sleep 1
          xcrun simctl launch "$UUID" "$BUNDLE_ID"
          EXIT=$?
          set -e

          # If launch failed and not recording, grab a short failure clip
          if [[ $EXIT -ne 0 && "${RECORD:-0}" != "1" ]]; then
            echo "Launch failed; capturing 6s video for diagnostics…"
            xcrun simctl io "$UUID" recordVideo "preview/run_failed.mp4" &
            VIDPID=$!
            sleep 6
          fi

          [[ -n "${VIDPID:-}" ]] && kill "$VIDPID" || true
          [[ -n "${LOGPID:-}" ]] && kill "$LOGPID" || true
          xcrun simctl shutdown "$UUID" || true

          # Delete only if we created a temp device
          NAME=$(xcrun simctl list devices -j | UUID="$UUID" python3 -c 'import json,sys,os; udid=os.environ["UUID"]; 
for _,devs in json.load(sys.stdin)["devices"].items():
  for d in devs:
    if d.get("udid")==udid: 
      print(d.get("name","")); raise SystemExit')
          if [[ "$NAME" == CM_RUN_* ]]; then xcrun simctl delete "$UUID" || true; fi

          exit $EXIT
