workflows:
  ios-build:
    name: iOS Cloud Firestore Fix
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean build folders
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock pubspec.lock
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Set iOS deployment target to 15.0
        script: |
          sed -i '' 's/13.0/15.0/g' ios/Runner.xcodeproj/project.pbxproj || true
      - name: Run pod install
        script: |
          cd ios
          pod install
      - name: Build iOS app
        script: |
          cd ..
          flutter build ios --release
