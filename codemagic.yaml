workflows:
  ios-sim-fast:
    name: iOS Simulator — Fast Boot
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        RECORD: "0"   # set to "1" to always record a video
    scripts:
      - name: Env info
        script: |
          set -euo pipefail
          flutter --version
          dart --version
          xcodebuild -version
          pod --version

      - name: Static checks (warnings only)
        script: |
          set -euo pipefail
          flutter pub get
          # Only fail on errors, not on info or warnings
          flutter analyze --no-fatal-infos || echo "⚠️ Analysis completed with warnings - continuing build"
          echo "✅ Analysis step completed - proceeding with build"
        fail_on_script_failure: false

      - name: Verify Firebase plist & bundle id
        script: |
          set -euo pipefail
          PLIST="ios/Runner/GoogleService-Info.plist"
          [ -f "$PLIST" ] || { echo "GoogleService-Info.plist missing at $PLIST"; exit 1; }
          P_BUNDLE=$(/usr/libexec/PlistBuddy -c 'Print:BUNDLE_ID' "$PLIST")
          X_BUNDLE=$(
            xcodebuild -showBuildSettings -project ios/Runner.xcodeproj -scheme Runner -configuration Debug 2>/dev/null \
            | awk -F' = ' '/PRODUCT_BUNDLE_IDENTIFIER/{print $2}' | tail -1
          )
          echo "Firebase plist bundle: $P_BUNDLE"
          echo "Resolved Xcode bundle: $X_BUNDLE"
          [ "$P_BUNDLE" = "$X_BUNDLE" ] || { echo "ERROR: Bundle IDs do not match."; exit 2; }

      - name: Pod install (incremental)
        script: |
          set -euo pipefail
          (cd ios && pod install)
          
      - name: Fix Firebase dependencies
        script: |
          set -euo pipefail
          # Fix GTMSessionFetcherCore issue
          echo "Patching FirebaseFunctions to use GTMSessionFetcher instead of GTMSessionFetcherCore"
          if [ -f "ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift" ]; then
            chmod +rw ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift
            sed -i '' 's/import GTMSessionFetcherCore/import GTMSessionFetcher/g' ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift || { 
              echo "Failed to patch with sed, trying patch command" 
              patch -p1 < fix_use_measured_og_v2.patch || echo "Patch already applied or failed"
            }
          fi
          
          # Fix GoogleUtilities_AppDelegateSwizzler issue
          echo "Patching FirebaseAuth to use GoogleUtilities instead of GoogleUtilities_AppDelegateSwizzler"
          if [ -f "ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift" ]; then
            chmod +rw ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift
            sed -i '' 's/import GoogleUtilities_AppDelegateSwizzler/import GoogleUtilities/g' ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift || {
              echo "Failed to patch with sed, trying patch command"
              patch -p1 < fix_google_utilities.patch || echo "Patch already applied or failed"
            }
          fi

      - name: Build app (same experience as Android)
        script: |
          set -euo pipefail
          # Ensure iOS minimum version is set to 15.0
          if [ -f "ios/Flutter/AppFrameworkInfo.plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 15.0" ios/Flutter/AppFrameworkInfo.plist
            echo "Updated AppFrameworkInfo.plist minimum OS version to 15.0"
          fi
          
          if [ -f "ios/Podfile" ]; then
            if ! grep -q "platform :ios, '15.0'" ios/Podfile; then
              sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/g" ios/Podfile
              echo "Updated Podfile platform to iOS 15.0"
              (cd ios && pod install)
            fi
          fi
          
          flutter build ios --simulator --debug -t lib/main.dart \
            --dart-define=RC_API_KEY_IOS=${RC_API_KEY_IOS:-} \
            --dart-define=RC_API_KEY_ANDROID=${RC_API_KEY_ANDROID:-}

      - name: Run on Simulator and record
        script: |
          set -euo pipefail
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          [ -d "$APP_PATH" ] || { echo "Runner.app not found"; exit 1; }
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print:CFBundleIdentifier' "$APP_PATH/Info.plist")

          # Newest available iOS runtime (single-line Python)
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 -c 'import json,sys; rs=[r for r in json.load(sys.stdin)["runtimes"] if r.get("isAvailable",True) and r["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]; rs.sort(key=lambda x:(x.get("version") or "", x["identifier"])); print(rs[-1]["identifier"])')
          echo "Runtime: $RUNTIME_ID"

          # Reuse a Shutdown iPhone under that runtime if present
          UUID=$(xcrun simctl list devices -j | RUNTIME_ID="$RUNTIME_ID" python3 -c 'import json,sys,os; rt=os.environ["RUNTIME_ID"]; ds=json.load(sys.stdin)["devices"].get(rt,[]); print(next((d["udid"] for d in ds if d.get("isAvailable",True) and d.get("state")=="Shutdown" and d.get("name","").startswith("iPhone")), ""))') || true

          CREATED=0
          if [[ -z "${UUID:-}" ]]; then
            # Pick newest iPhone device type by name (single-line Python)
            DEVICE_NAME=$(xcrun simctl list devicetypes -j | python3 -c 'import json,re,sys; dt=json.load(sys.stdin)["devicetypes"]; iph=[d["name"] for d in dt if d["name"].startswith("iPhone ")]; num=lambda n:(int(re.search(r"(\\d+)",n).group(1)) if re.search(r"(\\d+)",n) else 0); iph.sort(key=num, reverse=True); print(iph[0] if iph else dt[-1]["name"])')
            echo "Creating device: $DEVICE_NAME"
            set +e
            UUID=$(xcrun simctl create "CM_RUN_$$" "$DEVICE_NAME" "$RUNTIME_ID" 2>/dev/null)
            [[ -n "$UUID" ]] || UUID=$(xcrun simctl create "CM_RUN_$$" "$DEVICE_NAME")
            set -e
            CREATED=1
          fi

          [[ -n "$UUID" ]] || { echo "Failed to obtain/create a simulator device"; exit 1; }
          echo "Using simulator: $UUID"

          xcrun simctl boot "$UUID" || true
          xcrun simctl bootstatus "$UUID" -b || true
          sleep 2

          mkdir -p preview sim_logs
          LOGFILE="sim_logs/run_$(date +%s).log"
          xcrun simctl spawn "$UUID" log stream --level=debug --style compact --predicate "process == \"Runner\"" > "$LOGFILE" 2>&1 &
          LOGPID=$!

          if [[ "${RECORD:-0}" == "1" ]]; then
            xcrun simctl io "$UUID" recordVideo "preview/run.mp4" &
            VIDPID=$!
            sleep 1
          fi

          set +e
          xcrun simctl install "$UUID" "$APP_PATH"
          sleep 1
          xcrun simctl launch "$UUID" "$BUNDLE_ID"
          EXIT=$?
          set -e

          if [[ $EXIT -ne 0 && "${RECORD:-0}" != "1" ]]; then
            echo "Launch failed; capturing 6s video for diagnostics…"
            xcrun simctl io "$UUID" recordVideo "preview/run_failed.mp4" &
            VIDPID=$!
            sleep 6
          fi

          [[ -n "${VIDPID:-}" ]] && kill "$VIDPID" || true
          [[ -n "${LOGPID:-}" ]] && kill "$LOGPID" || true
          xcrun simctl shutdown "$UUID" || true
          # Only delete if we created a temp device (avoids Python here)
          if [[ "$CREATED" == "1" ]]; then xcrun simctl delete "$UUID" || true; fi

          # Capture build logs for diagnostics
          mkdir -p build_logs
          if [[ -f ios/Pods/Pods.xcodeproj/project.pbxproj ]]; then
            cp ios/Pods/Pods.xcodeproj/project.pbxproj build_logs/pods_project.pbxproj || true
          fi
          
          if [[ $EXIT -ne 0 ]]; then
            echo "Build or run failed, collecting diagnostic info..."
            # Log Flutter doctor info
            flutter doctor -v > build_logs/flutter_doctor.log
            # Log pod environment
            (cd ios && pod env) > build_logs/pod_env.log 2>&1 || true
            # Check for common issues in the log file
            grep -i "error" "$LOGFILE" > build_logs/error_summary.log || true
          fi

          exit $EXIT

    artifacts:
      - build/ios/iphonesimulator/*.app
      - preview/*.mp4
      - sim_logs/*.log
      - build_logs/*
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods
