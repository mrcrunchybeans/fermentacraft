workflows:
  ios-sim-simple:
    name: iOS Simulator — Boot App
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Env info
        script: |
          set -euo pipefail
          flutter --version
          dart --version
          xcodebuild -version
          pod --version

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get

      - name: Verify Firebase plist & bundle id
        script: |
          set -euo pipefail
          PLIST="ios/Runner/GoogleService-Info.plist"
          [ -f "$PLIST" ] || { echo "GoogleService-Info.plist missing at $PLIST"; exit 1; }
          P_BUNDLE=$(/usr/libexec/PlistBuddy -c 'Print:BUNDLE_ID' "$PLIST")
          X_BUNDLE=$(
            xcodebuild -showBuildSettings -project ios/Runner.xcodeproj -scheme Runner -configuration Debug 2>/dev/null \
            | awk -F' = ' '/PRODUCT_BUNDLE_IDENTIFIER/{print $2}' | tail -1
          )
          echo "Firebase plist bundle: $P_BUNDLE"
          echo "Resolved Xcode bundle: $X_BUNDLE"
          [ "$P_BUNDLE" = "$X_BUNDLE" ] || { echo "ERROR: Bundle IDs do not match."; exit 2; }

      - name: Reset Pods and install (fresh)
        script: |
          set -euo pipefail
          rm -rf ios/Pods ios/Podfile.lock
          (cd ios && pod install --repo-update)

      - name: Build app (same experience as Android)
        script: |
          set -euo pipefail
          # RC keys are optional; if RC_API_KEY_IOS is unset/empty, iOS falls back to Firestore automatically.
          flutter build ios --simulator --debug -t lib/main.dart \
            --dart-define=RC_API_KEY_IOS=${RC_API_KEY_IOS:-} \
            --dart-define=RC_API_KEY_ANDROID=${RC_API_KEY_ANDROID:-}

      - name: Run on Simulator and record
        script: |
          set -euo pipefail
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          [ -d "$APP_PATH" ] || { echo "Runner.app not found"; exit 1; }
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print:CFBundleIdentifier' "$APP_PATH/Info.plist")

          DEVICE_NAME="${DEVICE_NAME:-iPhone 15}"
          DEVICE_ID=$(xcrun simctl list devicetypes -j | python3 -c 'import sys,json,os; name=os.environ.get("DEVICE_NAME"); dt=json.load(sys.stdin)["devicetypes"]; print(next((d["identifier"] for d in dt if d["name"]==name), dt[-1]["identifier"]))')
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 -c 'import sys,json; r=[x for x in json.load(sys.stdin)["runtimes"] if x.get("isAvailable",True) and x["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]; r=sorted(r, key=lambda x: (x.get("version") or "0", x["identifier"])); print(r[-1]["identifier"])')

          UUID=$(xcrun simctl create "CM_RUN_$$" "$DEVICE_ID" "$RUNTIME_ID")
          xcrun simctl boot "$UUID"
          xcrun simctl bootstatus "$UUID" -b || true
          sleep 3

          mkdir -p preview sim_logs
          LOGFILE="sim_logs/run_$(date +%s).log"
          xcrun simctl spawn "$UUID" log stream --level=debug --style=compact --predicate "process == 'Runner'" > "$LOGFILE" 2>&1 &
          LOGPID=$!

          VIDEO_PATH="preview/run.mp4"
          xcrun simctl io "$UUID" recordVideo "$VIDEO_PATH" &
          VIDPID=$!
          sleep 2

          xcrun simctl install "$UUID" "$APP_PATH"
          sleep 2
          xcrun simctl launch "$UUID" "$BUNDLE_ID" || true
          sleep 10

          if [[ -n "${VIDPID:-}" ]]; then kill "$VIDPID" || true; fi
          if [[ -n "${LOGPID:-}" ]]; then kill "$LOGPID" || true; fi
          xcrun simctl shutdown "$UUID" || true
          xcrun simctl delete "$UUID" || true

    artifacts:
      - build/ios/iphonesimulator/*.app
      - preview/*.mp4
      - sim_logs/*.log
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods
