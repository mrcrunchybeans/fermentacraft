workflows:
  ios-simulator:
    name: iOS Simulator Build + Run + Record (Diag + Safe)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Env info
        script: |
          set -euo pipefail
          pwd && ls -la
          flutter --version
          dart --version
          xcodebuild -version
          pod --version

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get

      - name: Reset Pods and install (fresh)
        script: |
          set -euo pipefail
          rm -rf ios/Pods ios/Podfile.lock
          (cd ios && pod install --repo-update)

      # ===== Pass 1: DIAG app (no services) =====
      - name: Build DIAG app (no services)
        script: |
          set -euo pipefail
          flutter build ios --simulator --debug -t lib/main_ios_diag.dart

      - name: Run DIAG app on Simulator and record
        script: |
          set -euo pipefail
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi

          # Read identifiers robustly
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print:CFBundleIdentifier' "$APP_PATH/Info.plist")
          DEVICE_NAME="iPhone 15"

          DEVICE_ID=$(xcrun simctl list devicetypes -j | python3 - <<'PY'
import json,sys,os
name=os.environ.get("DEVICE_NAME","iPhone 15")
data=json.load(sys.stdin)["devicetypes"]
c=[d for d in data if d["name"]==name]
print(c[0]["identifier"] if c else data[-1]["identifier"])
PY
)
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 - <<'PY'
import json,sys
r=[x for x in json.load(sys.stdin)["runtimes"]
   if x.get("isAvailable",True) and x["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]
# Sort by version string if present; fall back to identifier order
r=sorted(r, key=lambda x: (x.get("version") or "0", x["identifier"]))
print(r[-1]["identifier"])
PY
)

          echo "Using DEVICE_ID=$DEVICE_ID"
          echo "Using RUNTIME_ID=$RUNTIME_ID"

          UUID=$(xcrun simctl create "CM_DIAG_$$" "$DEVICE_ID" "$RUNTIME_ID")
          xcrun simctl boot "$UUID"
          xcrun simctl bootstatus "$UUID" -b

          mkdir -p preview sim_logs
          LOGFILE="sim_logs/diag_$(date +%s).log"
          (xcrun simctl spawn "$UUID" log stream --level=debug --style compact --predicate "process == 'Runner'" > "$LOGFILE" 2>&1 &) 
          LOGPID=$!

          VIDEO_PATH="preview/diag.mp4"
          (xcrun simctl io "$UUID" recordVideo "$VIDEO_PATH" &) 
          VIDPID=$!
          sleep 2

          xcrun simctl install "$UUID" "$APP_PATH"
          xcrun simctl launch "$UUID" "$BUNDLE_ID" || true
          sleep 8

          kill $VIDPID || true
          kill $LOGPID || true
          xcrun simctl shutdown "$UUID" || true
          xcrun simctl delete "$UUID" || true

      # ===== Pass 2: SAFE main (IOS_SAFE_MODE=true) =====
      - name: Build SAFE main (IOS_SAFE_MODE=true)
        script: |
          set -euo pipefail
          flutter build ios --simulator --debug -t lib/main_ios_safe.dart --dart-define=IOS_SAFE_MODE=true

      - name: Run SAFE main (safe=true) and record
        script: |
          set -euo pipefail
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print:CFBundleIdentifier' "$APP_PATH/Info.plist")
          DEVICE_NAME="iPhone 15"
          DEVICE_ID=$(xcrun simctl list devicetypes -j | python3 - <<'PY'
import json,sys,os
name=os.environ.get("DEVICE_NAME","iPhone 15")
data=json.load(sys.stdin)["devicetypes"]
c=[d for d in data if d["name"]==name]
print(c[0]["identifier"] if c else data[-1]["identifier"])
PY
)
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 - <<'PY'
import json,sys
r=[x for x in json.load(sys.stdin)["runtimes"]
   if x.get("isAvailable",True) and x["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]
r=sorted(r, key=lambda x: (x.get("version") or "0", x["identifier"]))
print(r[-1]["identifier"])
PY
)

          UUID=$(xcrun simctl create "CM_SAFE_T_$$" "$DEVICE_ID" "$RUNTIME_ID")
          xcrun simctl boot "$UUID"
          xcrun simctl bootstatus "$UUID" -b

          mkdir -p preview sim_logs
          LOGFILE="sim_logs/safe_true_$(date +%s).log"
          (xcrun simctl spawn "$UUID" log stream --level=debug --style compact --predicate "process == 'Runner'" > "$LOGFILE" 2>&1 &) 
          LOGPID=$!

          VIDEO_PATH="preview/safe_true.mp4"
          (xcrun simctl io "$UUID" recordVideo "$VIDEO_PATH" &) 
          VIDPID=$!
          sleep 2

          xcrun simctl install "$UUID" "$APP_PATH"
          xcrun simctl launch "$UUID" "$BUNDLE_ID" || true
          sleep 8

          kill $VIDPID || true
          kill $LOGPID || true
          xcrun simctl shutdown "$UUID" || true
          xcrun simctl delete "$UUID" || true

      # ===== Pass 3: SAFE main (IOS_SAFE_MODE=false) =====
      - name: Build SAFE main (IOS_SAFE_MODE=false)
        script: |
          set -euo pipefail
          flutter build ios --simulator --debug -t lib/main_ios_safe.dart --dart-define=IOS_SAFE_MODE=false

      - name: Run SAFE main (safe=false) and record
        script: |
          set -euo pipefail
          APP_PATH="build/ios/iphonesimulator/Runner.app"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print:CFBundleIdentifier' "$APP_PATH/Info.plist")
          DEVICE_NAME="iPhone 15"
          DEVICE_ID=$(xcrun simctl list devicetypes -j | python3 - <<'PY'
import json,sys,os
name=os.environ.get("DEVICE_NAME","iPhone 15")
data=json.load(sys.stdin)["devicetypes"]
c=[d for d in data if d["name"]==name]
print(c[0]["identifier"] if c else data[-1]["identifier"])
PY
)
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 - <<'PY'
import json,sys
r=[x for x in json.load(sys.stdin)["runtimes"]
   if x.get("isAvailable",True) and x["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")]
r=sorted(r, key=lambda x: (x.get("version") or "0", x["identifier"]))
print(r[-1]["identifier"])
PY
)

          UUID=$(xcrun simctl create "CM_SAFE_F_$$" "$DEVICE_ID" "$RUNTIME_ID")
          xcrun simctl boot "$UUID"
          xcrun simctl bootstatus "$UUID" -b

          mkdir -p preview sim_logs
          LOGFILE="sim_logs/safe_false_$(date +%s).log"
          (xcrun simctl spawn "$UUID" log stream --level=debug --style compact --predicate "process == 'Runner'" > "$LOGFILE" 2>&1 &) 
          LOGPID=$!

          VIDEO_PATH="preview/safe_false.mp4"
          (xcrun simctl io "$UUID" recordVideo "$VIDEO_PATH" &) 
          VIDPID=$!
          sleep 2

          xcrun simctl install "$UUID" "$APP_PATH"
          xcrun simctl launch "$UUID" "$BUNDLE_ID" || true
          sleep 10

          kill $VIDPID || true
          kill $LOGPID || true
          xcrun simctl shutdown "$UUID" || true
          xcrun simctl delete "$UUID" || true

    artifacts:
      - build/ios/iphonesimulator/*.app
      - preview/*.mp4
      - sim_logs/*.log
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods
