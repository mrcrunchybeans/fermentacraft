workflows:
  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Env info
        script: |
          set -euo pipefail
          pwd
          ls -la
          flutter --version
          dart --version
          xcodebuild -version
          pod --version
      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
      - name: Pod install for iOS (with repo update)
        script: |
          set -euo pipefail
          (cd ios && pod install --repo-update)
      - name: Build iOS for Simulator (Debug)
        script: |
          set -euo pipefail
          # We are already at the repo root (where pubspec.yaml is)
          flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/*.app
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods

  ios-release-nocodesign:
    name: iOS Release (no codesign)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Env info
        script: |
          set -euo pipefail
          pwd
          ls -la
          flutter --version
          xcodebuild -version
          pod --version
      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
      - name: Pod install for iOS (with repo update)
        script: |
          set -euo pipefail
          (cd ios && pod install --repo-update)
      - name: Build iOS (no codesign)
        script: |
          set -euo pipefail
          # Still at repo root
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/archive/*.xcarchive
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods
