---
directories:
- AC_SOURCE
- AC_OUTPUT_DIR

steps:
# Git Clone Repository
- componentType: appcircle_git_clone
  componentVersion: 1.1.*
  stepName: Git Clone
  enabled: true
  onError: $exit
  inputs:
  - AC_GIT_URL: $AC_GIT_URL
  - AC_GIT_COMMIT: $AC_GIT_COMMIT
  - AC_GIT_BRANCH: $AC_GIT_BRANCH
  - AC_GIT_LFS: 'false'
  outputs:
  - AC_REPOSITORY_DIR: AC_REPOSITORY_DIR

# Install Flutter 3.27.1 for Sprint 2.5 (includes Dart 3.8.0+)
- componentType: appcircle_flutter_install
  componentVersion: 1.0.*
  stepName: Flutter Install
  enabled: true
  onError: $exit
  inputs:
  - AC_SELECTED_FLUTTER_VERSION: "3.27.1"
  outputs:
  - PATH: "PATH"

# Flutter Dependencies and CocoaPods
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: Setup Dependencies
  enabled: true
  onError: $exit
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      cd "$AC_REPOSITORY_DIR"
      echo "🚀 FermentaCraft Sprint 2.5 - iOS Development Launch"
      echo "🔧 Checking Flutter and Dart versions..."
      flutter --version
      dart --version
      
      # Clear pub cache to avoid stale dependencies
      flutter clean
      
      # Attempt dependency resolution with multiple strategies
      echo "📦 Resolving dependencies..."
      if ! flutter pub get; then
        echo "⚠️  Initial pub get failed, trying dependency override resolution..."
        
        # Create temporary dependency overrides
        echo "dependency_overrides:" >> pubspec.yaml
        echo "  path: 1.9.0  # Match Flutter SDK pinned version" >> pubspec.yaml
        
        if ! flutter pub get; then
          echo "❌ Dependency resolution failed with overrides"
          echo "📋 Available packages:"
          flutter pub deps --style=compact || true
          exit 1
        else
          echo "✅ Dependencies resolved with overrides"
        fi
      else
        echo "✅ Dependencies resolved successfully"
      fi
      
      # Prepare iOS dependencies
      flutter precache --ios
      cd ios
      pod repo update
      pod install

# Flutter Analysis
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: Flutter Analysis
  enabled: true
  onError: $exit
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      cd "$AC_REPOSITORY_DIR"
      flutter analyze --no-fatal-infos

# Flutter Tests
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: Flutter Tests
  enabled: true
  onError: $next
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      cd "$AC_REPOSITORY_DIR"
      if [ -d "test" ]; then
        echo "🧪 Running Flutter tests..."
        flutter test --coverage
      else
        echo "⚠️  No tests found - skipping test execution"
      fi

# Build iOS Simulator for Sprint 2.5 Testing
- componentType: appcircle_ios_build_simulator
  componentVersion: 1.3.*
  stepName: Build iOS Simulator
  enabled: true
  onError: $exit
  inputs:
  - AC_REPOSITORY_DIR: $AC_REPOSITORY_DIR
  - AC_OUTPUT_DIR_PATH: $AC_OUTPUT_DIR
  - AC_SCHEME: "Runner"
  - AC_SIMULATOR_ARCH: "arm64"
  - AC_SIMULATOR_NAME: "iPhone 15"
  - AC_PROJECT_PATH: "$AC_REPOSITORY_DIR/ios/Runner.xcworkspace"
  - AC_CONFIGURATION_NAME: "Debug"
  outputs:
  - AC_SIMULATOR_APP_PATH: AC_SIMULATOR_APP_PATH

# Export Build Artifacts
- componentType: appcircle_export_build_artifacts
  componentVersion: 1.0.*
  stepName: Export Build Artifacts
  alwaysRun: true
  enabled: true
  onError: $exit
  inputs:
  - AC_UPLOAD_DIR: $AC_OUTPUT_DIR

# Build Summary
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: Build Summary
  enabled: true
  onError: $next
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      echo ""
      echo "🎉 FermentaCraft iOS Simulator Build Complete!"
      echo "=============================================="
      echo "📱 Sprint 2.5 - iOS Development Launch"
      echo "🎯 Build Type: iOS Simulator (Debug)"
      echo "⏰ Build Time: $(date)"
      echo ""
      echo "📦 Testing Focus Areas:"
      echo "  ✅ App launches without crashes"
      echo "  ✅ iOS platform services integration"
      echo "  ✅ Firebase Auth flow"
      echo "  ✅ File operations (camera/photos)"
      echo "  ✅ Repository pattern functionality"
      echo ""
      echo "Next: Continue Sprint 2.5 on macOS for device testing!"