directories:
  - AC_SOURCE
  - AC_OUTPUT_DIR
steps:
  - componentType: appcircle_git_clone
    componentVersion: 1.1.*
    stepName: Git Clone
    enabled: true
    onError: $exit
    inputs:
      - AC_GIT_URL: $AC_GIT_URL
      - AC_GIT_COMMIT: $AC_GIT_COMMIT
      - AC_GIT_BRANCH: $AC_GIT_BRANCH
      - AC_GIT_LFS: 'false'
    outputs:
      - AC_REPOSITORY_DIR: AC_REPOSITORY_DIR
    alwaysRun: false
  - componentType: appcircle_flutter_install
    componentVersion: 1.0.*
    stepName: Flutter Install
    enabled: true
    onError: $exit
    inputs:
      - AC_SELECTED_FLUTTER_VERSION: 3.35.4
    outputs:
      - PATH: PATH
    alwaysRun: false
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Setup Dependencies
    enabled: true
    onError: $exit
    inputs:
      - Execute: bash
      - Script: "set -e\ncd \"$AC_REPOSITORY_DIR\"\necho \"\U0001F680 FermentaCraft Sprint 2.5 - iOS Development Launch\"\necho \"\U0001F527 Checking Flutter and Dart versions...\"\nflutter --version\ndart --version\n\n# Clear pub cache to avoid stale dependencies\nflutter clean\n\n# Attempt dependency resolution\necho \"\U0001F4E6 Resolving dependencies...\"\nif ! flutter pub get; then\n  echo \"⚠️  Initial pub get failed, checking for version conflicts...\"\n  echo \"\U0001F4CB Dependency tree:\"\n  flutter pub deps --style=compact || true\n  \n  echo \"❌ Dependency resolution failed\"\n  echo \"� Try updating dependencies in pubspec.yaml or use Flutter 3.35.4+\"\n  exit 1\nelse\n  echo \"✅ Dependencies resolved successfully\"\nfi\n\n# Prepare iOS dependencies\nflutter precache --ios\ncd ios\npod repo update\npod install\n"
    alwaysRun: false
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Flutter Analysis
    enabled: true
    onError: $next
    inputs:
      - Execute: bash
      - Script: "cd \"$AC_REPOSITORY_DIR\"\necho \"\U0001F50D Running Flutter analysis (warnings only)...\"\nflutter analyze --no-fatal-infos || echo \"⚠️  Analysis completed with warnings - continuing build\"\necho \"✅ Analysis step completed - proceeding to build\"\n"
    alwaysRun: false
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Flutter Tests
    enabled: true
    onError: $next
    inputs:
      - Execute: bash
      - Script: "set -e\ncd \"$AC_REPOSITORY_DIR\"\nif [ -d \"test\" ]; then\n  echo \"\U0001F9EA Running Flutter tests...\"\n  flutter test --coverage\nelse\n  echo \"⚠️  No tests found - skipping test execution\"\nfi\n"
    alwaysRun: false
  - componentType: appcircle_custom_script
    stepName: Flutter iOS Simulator Prebuild (Debug)
    enabled: true
    inputs:
      - Execute: "bash"
      - Script: |
          set -euxo pipefail
          cd "$AC_REPOSITORY_DIR"
          flutter pub get
          # Ensure iOS bits are present & fresh
          flutter precache --ios
          
          # Apply patches before build
          echo "Patching FirebaseFunctions to use GTMSessionFetcher instead of GTMSessionFetcherCore"
          if [ -f "ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift" ]; then
            sudo chmod +rw ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift
            sed -i '' 's/import GTMSessionFetcherCore/import GTMSessionFetcher/g' ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift || { echo "Failed to patch with sed, trying patch command"; sudo patch -p1 < fix_use_measured_og_v2.patch || echo "Patch already applied or failed"; }
          fi
          
          echo "Patching FirebaseAuth to use GoogleUtilities instead of GoogleUtilities_AppDelegateSwizzler"
          if [ -f "ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift" ]; then
            sudo chmod +rw ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift
            sed -i '' 's/import GoogleUtilities_AppDelegateSwizzler/import GoogleUtilities/g' ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift || { echo "Failed to patch with sed, trying patch command"; sudo patch -p1 < fix_google_utilities.patch || echo "Patch already applied or failed"; }
          fi
          
          # Try the simulator build via Flutter (no codesign)
          flutter build ios --simulator --debug --no-codesign -v
  - componentType: appcircle_export_build_artifacts
    componentVersion: 1.0.*
    stepName: Export Build Artifacts
    alwaysRun: true
    enabled: true
    onError: $exit
    inputs:
      - AC_UPLOAD_DIR: $AC_OUTPUT_DIR
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Build Summary
    enabled: true
    onError: $next
    inputs:
      - Execute: bash
      - Script: "set -e\necho \"\"\necho \"\U0001F389 FermentaCraft iOS Simulator Build Complete!\"\necho \"==============================================\"\necho \"\U0001F4F1 Sprint 2.5 - iOS Development Launch\"\necho \"\U0001F3AF Build Type: iOS Simulator (Debug)\"\necho \"⏰ Build Time: $(date)\"\necho \"\"\necho \"\U0001F4E6 Testing Focus Areas:\"\necho \"  ✅ App launches without crashes\"\necho \"  ✅ iOS platform services integration\"\necho \"  ✅ Firebase Auth flow\"\necho \"  ✅ File operations (camera/photos)\"\necho \"  ✅ Repository pattern functionality\"\necho \"\"\necho \"Next: Continue Sprint 2.5 on macOS for device testing!\"\n"
    alwaysRun: false
