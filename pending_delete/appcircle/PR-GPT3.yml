---
directories:
- AC_SOURCE
- AC_OUTPUT_DIR

steps:
# 1) Clone via HTTPS (no SSH needed)
- componentType: appcircle_git_clone
  componentVersion: 1.1.*
  stepName: Git Clone
  enabled: true
  onError: $exit
  inputs:
  - AC_GIT_URL: $AC_GIT_URL
  - AC_GIT_COMMIT: $AC_GIT_COMMIT
  - AC_GIT_BRANCH: $AC_GIT_BRANCH
  - AC_GIT_LFS: 'false'
  outputs:
  - AC_REPOSITORY_DIR: AC_REPOSITORY_DIR

# 2) Install Flutter (pin to match the runner image, or leave "" to use image default)
- componentType: appcircle_flutter_install
  componentVersion: 1.0.*
  stepName: Flutter Install
  enabled: true
  onError: $exit
  inputs:
  - AC_SELECTED_FLUTTER_VERSION: "3.35.4"   # or "" to use image default
  outputs:
  - PATH: "PATH"

# 3) CocoaPods install/update
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: CocoaPods Setup
  enabled: true
  onError: $exit
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      cd "$AC_REPOSITORY_DIR"
      flutter pub get
      flutter precache --ios
      cd ios
      pod repo update
      pod install


# 4) Static analysis
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: Dart Analyze
  enabled: true
  onError: $exit
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      cd "$AC_REPOSITORY_DIR"
      flutter pub get
      dart analyze

# 5) Flutter unit tests (host-side)
- componentType: appcircle_custom_script
  componentVersion: 1.0.*
  stepName: Flutter Tests
  enabled: true
  onError: $exit
  inputs:
  - Execute: "bash"
  - Script: |
      set -e
      cd "$AC_REPOSITORY_DIR"
      flutter test --coverage

# 6) Build a Simulator .app (no signing required)
- componentType: appcircle_ios_build_simulator
  componentVersion: 1.3.*
  stepName: Xcodebuild for iOS Simulator
  enabled: true
  onError: $next
  inputs:
  - AC_REPOSITORY_DIR: $AC_REPOSITORY_DIR
  - AC_OUTPUT_DIR_PATH: $AC_OUTPUT_DIR
  - AC_SCHEME: "Runner"
  - AC_SIMULATOR_ARCH: "arm64"
  - AC_SIMULATOR_NAME: "iPhone 15"
  - AC_PROJECT_PATH: "$AC_REPOSITORY_DIR/ios/Runner.xcworkspace"
  - AC_CONFIGURATION_NAME: "Debug"
  outputs:
  - AC_SIMULATOR_APP_PATH: AC_SIMULATOR_APP_PATH

# 7) Export artifacts (.app + logs)
- componentType: appcircle_export_build_artifacts
  componentVersion: 1.0.*
  stepName: Export Build Artifacts
  alwaysRun: true
  enabled: true
  onError: $exit
  inputs:
  - AC_UPLOAD_DIR: $AC_OUTPUT_DIR
