directories:
  - AC_SOURCE
  - AC_OUTPUT_DIR
steps:
  - componentType: appcircle_git_clone
    componentVersion: 1.1.*
    stepName: Git Clone
    enabled: true
    onError: $exit
    inputs:
      - AC_GIT_URL: $AC_GIT_URL
      - AC_GIT_COMMIT: $AC_GIT_COMMIT
      - AC_GIT_BRANCH: $AC_GIT_BRANCH
      - AC_GIT_LFS: 'false'
    outputs:
      - AC_REPOSITORY_DIR: AC_REPOSITORY_DIR
    alwaysRun: false
  - componentType: appcircle_flutter_install
    componentVersion: 1.0.*
    stepName: Flutter Install
    enabled: true
    onError: $exit
    inputs:
      - AC_SELECTED_FLUTTER_VERSION: 3.35.4
    outputs:
      - PATH: PATH
    alwaysRun: false
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Setup Dependencies
    enabled: true
    onError: $exit
    inputs:
      - Execute: bash
      - Script: "set -e\ncd \"$AC_REPOSITORY_DIR\"\necho \"\U0001F680 FermentaCraft Sprint 2.5 - iOS Development Launch\"\necho \"\U0001F527 Checking Flutter and Dart versions...\"\nflutter --version\ndart --version\n\n# Clear pub cache to avoid stale dependencies\nflutter clean\n\n# Attempt dependency resolution\necho \"\U0001F4E6 Resolving dependencies...\"\nif ! flutter pub get; then\n  echo \"⚠️  Initial pub get failed, checking for version conflicts...\"\n  echo \"\U0001F4CB Dependency tree:\"\n  flutter pub deps --style=compact || true\n  \n  echo \"❌ Dependency resolution failed\"\n  echo \"� Try updating dependencies in pubspec.yaml or use Flutter 3.35.4+\"\n  exit 1\nelse\n  echo \"✅ Dependencies resolved successfully\"\nfi\n\n# Prepare iOS dependencies\nflutter precache --ios\ncd ios\npod repo update\npod install\n"
    alwaysRun: false
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Flutter Analysis
    enabled: true
    onError: $next
    inputs:
      - Execute: bash
      - Script: "cd \"$AC_REPOSITORY_DIR\"\necho \"\U0001F50D Running Flutter analysis (warnings only)...\"\nflutter analyze --no-fatal-infos || echo \"⚠️  Analysis completed with warnings - continuing build\"\necho \"✅ Analysis step completed - proceeding to build\"\n"
    alwaysRun: false
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Flutter Tests
    enabled: true
    onError: $next
    inputs:
      - Execute: bash
      - Script: "set -e\ncd \"$AC_REPOSITORY_DIR\"\nif [ -d \"test\" ]; then\n  echo \"\U0001F9EA Running Flutter tests...\"\n  flutter test --coverage\nelse\n  echo \"⚠️  No tests found - skipping test execution\"\nfi\n"
    alwaysRun: false
  - componentType: appcircle_custom_script
    stepName: Flutter iOS Simulator Prebuild (Debug)
    enabled: true
    inputs:
      - Execute: "bash"
      - Script: |
          # Don't use set -e so we can capture diagnostics if something fails
          set -uxo pipefail
          cd "$AC_REPOSITORY_DIR"
          
          # Create a log directory for diagnostic information
          mkdir -p "$AC_OUTPUT_DIR/patch_logs"
          PATCH_LOG="$AC_OUTPUT_DIR/patch_logs/firebase_patch_$(date +%s).log"
          echo "Firebase patch log - $(date)" > "$PATCH_LOG"
          
          # Function to log messages to both console and log file
          log_message() {
            echo "$1" | tee -a "$PATCH_LOG"
          }
          
          log_message "🔄 Running Flutter pub get..."
          if flutter pub get; then
            log_message "✅ Flutter pub get completed successfully"
          else
            log_message "⚠️ Flutter pub get encountered issues but continuing"
          fi
          
          # Ensure iOS bits are present & fresh
          log_message "🔄 Ensuring iOS tooling is ready..."
          flutter precache --ios
          
          # Execute Firebase imports fix script
          if [ -f "scripts/firebase_imports_fix.sh" ]; then
            log_message "� Running Firebase imports fix script..."
            chmod +x scripts/firebase_imports_fix.sh
            if ./scripts/firebase_imports_fix.sh; then
              log_message "✅ Firebase imports fix script completed successfully"
            else
              log_message "⚠️ Firebase imports fix script reported issues"
              # Continue anyway as it might have fixed enough to work
            fi
            
            # Copy the generated log file to the output dir
            if [ -f "scripts/firebase_imports.txt" ]; then
              cp scripts/firebase_imports.txt "$AC_OUTPUT_DIR/diagnostics/firebase_imports.txt"
            fi
            
            # Copy any patch logs to the output dir
            find scripts -name "firebase_patch_*.log" -type f -exec cp {} "$AC_OUTPUT_DIR/patch_logs/" \;
          else
            log_message "⚠️ Firebase imports fix script not found at scripts/firebase_imports_fix.sh"
            log_message "⚠️ Proceeding without fixes, build may fail"
          fi
          
          # Try the simulator build via Flutter (no codesign)
          log_message "🔄 Building Flutter iOS app for simulator..."
          flutter build ios --simulator --debug --no-codesign -v
          
          BUILD_RESULT=$?
          if [ $BUILD_RESULT -ne 0 ]; then
            log_message "❌ Build failed with exit code $BUILD_RESULT"
            log_message "Collecting diagnostic information..."
            
            # Capture diagnostics about the environment
            flutter doctor -v > "$AC_OUTPUT_DIR/diagnostics/flutter_doctor.txt"
            
            # Check for common errors in pod files
            find ios -name "*.log" -type f -exec grep -l "error:" {} \; | 
              xargs grep "error:" > "$AC_OUTPUT_DIR/diagnostics/pod_errors.txt" 2>/dev/null || 
              echo "No error logs found" > "$AC_OUTPUT_DIR/diagnostics/pod_errors.txt"
            
            # Capture important pod configuration
            if [ -f "ios/Podfile" ]; then
              cp ios/Podfile "$AC_OUTPUT_DIR/diagnostics/Podfile"
            fi
            
            if [ -f "ios/Podfile.lock" ]; then
              cp ios/Podfile.lock "$AC_OUTPUT_DIR/diagnostics/Podfile.lock"
            fi
            
            # Exit with the original error code
            log_message "Diagnostic information saved to diagnostics/"
            exit $BUILD_RESULT
          fi
          
          log_message "✅ Build completed successfully!"
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Capture Diagnostics
    enabled: true
    onError: $next
    alwaysRun: true
    inputs:
      - Execute: bash
      - Script: |
          # Always runs, even if previous steps failed
          cd "$AC_REPOSITORY_DIR"
          mkdir -p "$AC_OUTPUT_DIR/diagnostics"
          
          echo "Capturing build diagnostics..."
          
          # Check for important errors in the build logs
          if [ -d "ios" ]; then
            echo "===== Firebase Related Files =====" > "$AC_OUTPUT_DIR/diagnostics/file_paths.txt"
            find ios -name "Auth.swift" -o -name "AuthBackend.swift" -o -name "Functions.swift" -o -name "AuthAPNSTokenManager.swift" -o -name "AuthBackendRPCIssuer.swift" | sort >> "$AC_OUTPUT_DIR/diagnostics/file_paths.txt"
            
            # List import statements from key files to verify patches
            echo "===== Firebase Import Statements =====" > "$AC_OUTPUT_DIR/diagnostics/imports_final.txt"
            FUNCTIONS_FILE="ios/Pods/FirebaseFunctions/FirebaseFunctions/Sources/Functions.swift"
            AUTH_FILE="ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Auth/Auth.swift"
            AUTH_BACKEND_FILE="ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Backend/AuthBackend.swift"
            AUTH_APNS_FILE="ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/SystemService/AuthAPNSTokenManager.swift"
            AUTH_BACKEND_RPC_FILE="ios/Pods/FirebaseAuth/FirebaseAuth/Sources/Swift/Backend/AuthBackendRPCIssuer.swift"
            
            for FILE in "$FUNCTIONS_FILE" "$AUTH_FILE" "$AUTH_BACKEND_FILE" "$AUTH_APNS_FILE" "$AUTH_BACKEND_RPC_FILE"; do
              if [ -f "$FILE" ]; then
                echo -e "\n--- $FILE ---" >> "$AC_OUTPUT_DIR/diagnostics/imports_final.txt"
                grep "import " "$FILE" >> "$AC_OUTPUT_DIR/diagnostics/imports_final.txt" 2>/dev/null || echo "No imports found" >> "$AC_OUTPUT_DIR/diagnostics/imports_final.txt"
              fi
            done
          fi
          
          # Collect Flutter and environment versions for reference
          echo "===== Environment Info =====" > "$AC_OUTPUT_DIR/diagnostics/environment.txt"
          flutter --version >> "$AC_OUTPUT_DIR/diagnostics/environment.txt" 2>&1
          xcodebuild -version >> "$AC_OUTPUT_DIR/diagnostics/environment.txt" 2>&1 || echo "Xcode command not available" >> "$AC_OUTPUT_DIR/diagnostics/environment.txt"
          pod --version >> "$AC_OUTPUT_DIR/diagnostics/environment.txt" 2>&1 || echo "Pod command not available" >> "$AC_OUTPUT_DIR/diagnostics/environment.txt"
          
          # Check if any Podfile.lock exists and include it
          if [ -f "ios/Podfile.lock" ]; then
            cp ios/Podfile.lock "$AC_OUTPUT_DIR/diagnostics/Podfile.lock"
          fi
          
          # Look for error logs
          mkdir -p "$AC_OUTPUT_DIR/diagnostics/error_logs"
          find . -name "*.log" -type f -mtime -1 -exec grep -l "error:" {} \; | 
            xargs -I{} cp {} "$AC_OUTPUT_DIR/diagnostics/error_logs/" 2>/dev/null || true
          
          echo "Diagnostics captured in $AC_OUTPUT_DIR/diagnostics/"
          
          # Always succeed to prevent failing the workflow
          exit 0
          
  - componentType: appcircle_export_build_artifacts
    componentVersion: 1.0.*
    stepName: Export Build Artifacts
    alwaysRun: true
    enabled: true
    onError: $exit
    inputs:
      - AC_UPLOAD_DIR: $AC_OUTPUT_DIR
  - componentType: appcircle_custom_script
    componentVersion: 1.0.*
    stepName: Build Summary
    enabled: true
    onError: $next
    inputs:
      - Execute: bash
      - Script: |
          set -e
          echo ""
          echo "🎉 FermentaCraft iOS Simulator Build Complete!"
          echo "=============================================="
          echo "📱 Sprint 2.5 - iOS Development Launch"
          echo "🎯 Build Type: iOS Simulator (Debug)"
          echo "⏰ Build Time: $(date)"
          echo ""
          echo "📦 Testing Focus Areas:"
          echo "  ✅ App launches without crashes"
          echo "  ✅ iOS platform services integration"
          echo "  ✅ Firebase Auth flow"
          echo "  ✅ File operations (camera/photos)"
          echo "  ✅ Repository pattern functionality"
          echo ""
          echo "Note: Firebase import patches were applied automatically"
          echo "  - GTMSessionFetcherCore → GTMSessionFetcher"
          echo "  - GoogleUtilities_AppDelegateSwizzler → GoogleUtilities"
          echo "  - GoogleUtilities_Environment → GoogleUtilities (Auth.swift)"
          echo "  - GoogleUtilities_Environment → GoogleUtilities (AuthAPNSTokenManager.swift)"
          echo "  - @preconcurrency GTMSessionFetcherCore → @preconcurrency GTMSessionFetcher (AuthBackendRPCIssuer.swift)"
          echo ""
          echo "Next: Continue Sprint 2.5 on macOS for device testing!"
    alwaysRun: false
