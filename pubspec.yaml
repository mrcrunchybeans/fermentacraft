name: fermentacraft
description: A new Flutter project for tracking fermentation recipes.
publish_to: 'none'
version: 1.0.0+37

environment:
  sdk: '>=3.4.0 <4.0.0'

msix_config:
  display_name: FermentaCraft
  publisher_display_name: Brian Petry 
  identity_name: BrianPetry.FermentaCraft
  publisher: CN=115FAB00-DFE0-4774-9445-C1D4196A50C4
  msix_version: 1.0.3.0
  logo_path: assets/images/logo.png
  store: true


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  google_fonts: ^6.3.0
  package_info_plus: ^8.0.0
  universal_html: ^2.2.4
  path_provider: ^2.1.5
  file_selector: ^1.0.3
  fl_chart: ^1.0.0
  logger: ^2.3.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  file_picker: ^10.2.2
  image: ^4.2.0
  share_plus: ^11.0.0
  collection: ^1.18.0
  wakelock_plus: ^1.2.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.7
  firebase_auth: ^6.0.0
  firebase_core: ^4.0.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.0.0
  connectivity_plus: ^6.1.4
  purchases_flutter: ^9.2.0
  web: ^1.1.1
  cloud_functions: ^6.0.0
  http: ^1.5.0
  hive: ^2.2.3
  firebase_crashlytics: ^5.0.0
  shared_preferences: ^2.2.3
  in_app_review: ^2.0.8
  crypto: ^3.0.6





dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  analyzer: ^6.4.1
  msix: ^3.16.3



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/fermentacraft_logo_carboy.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#1B263B"
  image: assets/images/fermentacraftlogo.png

  color_dark: "#1B263B"
  image_dark: assets/images/fermentacraftlogo_darkmode.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/phstrip_help.png

  fonts:
    - family: LibreBaskerville
      fonts:
        - asset: fonts/LibreBaskerville-Regular.ttf
        - asset: fonts/LibreBaskerville-Italic.ttf
          style: italic
        - asset: fonts/LibreBaskerville-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Italic.ttf
          style: italic
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-Bold.ttf
          weight: 700