name: fermentacraft
description: A new Flutter project for tracking fermentation recipes.
publish_to: 'none'
version: 2.0.16+96

environment:
  sdk: '>=3.4.0 <4.0.0'

msix_config:
  display_name: FermentaCraft
  publisher_display_name: Brian Petry 
  identity_name: BrianPetry.FermentaCraft
  publisher: CN=115FAB00-DFE0-4774-9445-C1D4196A50C4
  msix_version: 2.0.96.0
  logo_path: assets/images/Square150x150Logo.png
  start_menu_icon_path: assets/images/Square44x44Logo.png
  tile_icon_path: assets/images/Square150x150Logo.png
  vs_generated_images_folder_path: assets/images
  icons_background_color: transparent
  store: true
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  google_fonts: ^6.3.0
  package_info_plus: ^8.0.0
  universal_html: ^2.2.4
  path_provider: ^2.1.5
  file_selector: ^1.0.3
  fl_chart: ^1.0.0
  logger: ^2.3.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  sign_in_with_apple: ^7.0.1
  file_picker: ^10.2.2
  image: ^4.2.0
  share_plus: ^11.0.0
  collection: ^1.18.0
  wakelock_plus: ^1.2.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.7
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.5.0
  connectivity_plus: ^6.1.4
  purchases_flutter: ^9.2.0
  web: ^1.1.1
  get_it: ^8.0.0
  cloud_functions: ^5.3.0
  http: ^1.5.0
  hive: ^2.2.3
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.3.0
  shared_preferences: ^2.2.3
  in_app_review: ^2.0.8
  crypto: ^3.0.6
  qr_flutter: ^4.1.0





dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0  # Compatible with Dart SDK 3.5.3+
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0  # Compatible with Flutter 3.27.1 path pinning
  analyzer: ^6.4.1
  msix: ^3.16.3



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/fermentacraft_logo_carboy.png"
  min_sdk_android: 21


flutter_native_splash:
  # Light mode splash (use a light background so dark-text logo is readable)
  color: "#FFFFFF"
  image: assets/images/fermentacraftlogo.png

  # Dark mode splash (keep your dark background with white-text logo)
  color_dark: "#1B263B"
  image_dark: assets/images/fermentacraftlogo_darkmode.png

  # Android 12 requires explicit section; mirror the same choices
  android_12:
    color: "#FFFFFF"
    image: assets/images/fermentacraftlogo.png
    color_dark: "#1B263B"
    image_dark: assets/images/fermentacraftlogo_darkmode.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/phstrip_help.png

  fonts:
    - family: LibreBaskerville
      fonts:
        - asset: fonts/LibreBaskerville-Regular.ttf
        - asset: fonts/LibreBaskerville-Italic.ttf
          style: italic
        - asset: fonts/LibreBaskerville-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Italic.ttf
          style: italic
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-Bold.ttf
          weight: 700