name: fermentacraft
description: A new Flutter project for tracking fermentation recipes.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  package_info_plus: ^8.0.0
  universal_html: ^2.2.4
  path_provider: ^2.1.3
  file_selector: ^1.0.3
  fl_chart: ^1.0.0
  logger: ^2.3.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  file_picker: ^10.2.2
  image: ^4.2.0
  share_plus: ^11.0.0
  collection: ^1.18.0
  wakelock_plus: ^1.2.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.7
  firebase_auth: ^6.0.0
  firebase_core: ^4.0.0
  google_sign_in: ^6.1.4
  cloud_firestore: ^6.0.0
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/fermentacraft_logo_carboy.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#1B263B"
  image: assets/images/fermentacraftlogo.png 

  color_dark: "#1B263B"
  image_dark: assets/images/fermentacraftlogo_darkmode.png 

flutter:
  uses-material-design: true

  assets:
    - assets/images/ 

  fonts:
    - family: LibreBaskerville
      fonts:
        - asset: fonts/LibreBaskerville-Regular.ttf
        - asset: fonts/LibreBaskerville-Italic.ttf
          style: italic
        - asset: fonts/LibreBaskerville-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Italic.ttf
          style: italic
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-Bold.ttf
          weight: 700