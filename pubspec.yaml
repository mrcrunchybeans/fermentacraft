name: fermentacraft
description: A new Flutter project for tracking fermentation recipes.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0' # A more flexible SDK constraint is common

# Dependencies are packages your app needs to run.
dependencies:
  flutter:
    sdk: flutter
  
  # Your app's core packages
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  package_info_plus: ^8.0.0
  universal_html: ^2.2.4

  # Other utility packages
  path_provider: ^2.1.3
  file_selector: ^1.0.3
  fl_chart: ^0.68.0
  logger: ^2.3.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  image: ^4.2.0
  share_plus: ^9.0.0
  collection: ^1.18.0
  wakelock_plus: ^1.2.0


# Development dependencies are tools for building and testing your app.
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

  # FIX: Moved these here as they are development tools.
  flutter_launcher_icons: ^0.13.1 
  flutter_native_splash: ^2.4.0


# Configuration for the flutter_launcher_icons package.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/fermentacraft_logo_carboy.png" # Using the carboy icon is better for a launcher
  min_sdk_android: 21


# Configuration for the flutter_native_splash package.
flutter_native_splash:
  color: "#1B263B"
  image: assets/images/fermentacraftlogo.png # IMPORTANT: Make sure this filename is exact!

  color_dark: "#1B263B"
  image_dark: assets/images/fermentacraftlogo_darkmode.png # Can use the same or a different one


# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  # FIX: The 'assets' section MUST be indented under 'flutter:'.
  assets:
    - assets/images/ # This includes all images in the folder.

  # Your fonts section is perfect.
  fonts:
    - family: LibreBaskerville
      fonts:
        - asset: fonts/LibreBaskerville-Regular.ttf
        - asset: fonts/LibreBaskerville-Italic.ttf
          style: italic
        - asset: fonts/LibreBaskerville-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Italic.ttf
          style: italic
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-Bold.ttf
          weight: 700